# Ruff configuration for claude-requirements-framework
line-length = 100
target-version = "py39"

# The plugin bundle under plugins/requirements-framework/hooks/ is a GENERATED,
# byte-identical mirror of hooks/*.py + hooks/lib/ (scripts/build_plugin_hooks.py,
# enforced by its --check freshness test). Linting the source of truth covers it —
# don't double-lint the generated copy, which would only re-flag the same deliberate
# sys.path-then-import (E402) pattern already ignored for the source layer.
extend-exclude = [
    "plugins/requirements-framework/hooks",
    # Vendored upstream code (langfuse/Claude-Observability-Plugin) — not our style domain.
    "hooks/_langfuse_hook.py",
]

# Honor the excludes even when files are passed to ruff EXPLICITLY (not just via
# directory traversal). Without this, `extend-exclude` only applies to `ruff check .`
# — the /v3-review tool gate runs `ruff check -- <changed files>`, so it would still
# lint the generated bundle (re-flagging its deliberate sys.path E402 pattern) and
# the vendored upstream file (whose style is not ours to fix).
force-exclude = true

[lint]
select = ["E", "F", "W"]  # Basic error, pyflakes, and warning rules
ignore = ["E501"]  # Line length handled separately

[lint.per-file-ignores]
# Hook entry points and test files run as scripts (not installed packages):
# they intentionally `sys.path.insert(...)` before importing local modules,
# which ruff flags as E402 (import not at top). The pattern is deliberate and
# pervasive in these two layers; hooks/lib/** are real packages and stay
# E402-checked. (Surfaced by the /v3-review tool-gate — see ADR-018 / Step 18c.)
"hooks/*.py" = ["E402"]
"tests/*.py" = ["E402"]
