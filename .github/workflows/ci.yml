name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        # pyyaml: config parsing (core). pydantic + jinja2: the light half of the
        # [llm] extra that the in-suite V3 tests (e.g. test_supervisor_config_driven)
        # import directly — NOT the full extra (which drags torch/sentence-transformers/
        # ragas). Without these the suite ModuleNotFound-crashes on a clean runner.
        run: pip install pyyaml pydantic jinja2

      - name: Prepare Claude home
        run: |
          mkdir -p ~/.claude/hooks/lib ~/.local/bin
          cp hooks/*.py ~/.claude/hooks/
          cp hooks/lib/*.py ~/.claude/hooks/lib/
          chmod +x ~/.claude/hooks/*.py
          cat > ~/.claude/settings.json <<'SETTINGS'
          {
            "hooks": {
              "PreToolUse": [
                {
                  "matcher": "Edit|Write|MultiEdit|Bash",
                  "hooks": [
                    {
                      "type": "command",
                      "command": "python3 ~/.claude/hooks/check-requirements.py",
                      "timeout": 5
                    }
                  ]
                }
              ]
            }
          }
          SETTINGS
          cp examples/global-requirements.yaml ~/.claude/requirements.yaml

      - name: Run doctor check
        run: python hooks/requirements-cli.py doctor --ci --repo "$(pwd)"

      - name: Run test suite
        run: python hooks/test_requirements.py

      - name: Check rendered prompts are fresh
        # Fails if any *.md rendered sibling is stale vs its *.md.j2 source.
        # jinja2 is already installed above.
        run: python scripts/render_prompts.py --check

      - name: Run V3 tests/ suite
        # Script-style suite (each file has its own TestRunner/main(), NOT pytest).
        # Heavy-dep files (Claude Agent SDK, OTel, etc.) self-skip cleanly when the
        # optional [llm] extras are absent — only the light extras are installed in
        # CI. Aggregate exit codes so one failing file fails the job.
        env:
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          rc=0
          for f in tests/test_*.py; do
            echo "== $f =="
            python "$f" || rc=1
          done
          exit $rc
